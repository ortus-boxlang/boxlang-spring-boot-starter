# -------------------------------------------------------------------------
# BoxLang Development Profile
#
# Activate with: --spring.profiles.active=dev
# or in application.properties: spring.profiles.active=dev
#
# Key difference from the default profile: templates are loaded directly
# from the source tree (file:) instead of the compiled classpath (classpath:).
# This means edits to .bxm files are picked up immediately on the next
# request — no restart or rebuild needed.
# -------------------------------------------------------------------------

# Point directly at the source templates directory for instant hot-reload
boxlang.prefix=file:src/main/resources/templates/

# Enable BoxLang debug mode in development
boxlang.debug-mode=true

# Verbose logging in development
logging.level.ortus.boxlang=DEBUG
logging.level.org.springframework.web=DEBUG
